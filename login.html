<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kirish — Samarqand Geoportal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 12% 10%, rgba(79,158,255,0.16), transparent 14%),
        radial-gradient(circle at 82% 8%, rgba(26,92,198,0.12), transparent 16%),
        linear-gradient(180deg, #091528 0%, #050b18 55%, #02040a 100%);
      font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #eef3ff;
    }

    .login-box {
      background: rgba(15, 26, 48, 0.97);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 24px;
      padding: 48px 44px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 28px 75px rgba(0,0,0,0.4);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo svg {
      width: 52px;
      height: 52px;
      margin-bottom: 12px;
    }

    .logo h1 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #eef3ff;
      line-height: 1.4;
    }

    .logo p {
      font-size: 0.8rem;
      color: #9eb4db;
      margin-top: 4px;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      color: #9eb4db;
      margin-bottom: 6px;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: #eef3ff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 18px;
    }

    input:focus {
      border-color: #57a7ff;
      background: rgba(87,167,255,0.07);
    }

    input::placeholder {
      color: rgba(158,180,219,0.45);
    }

    .password-wrap {
      position: relative;
    }

    .password-wrap input {
      padding-right: 44px;
      margin-bottom: 0;
    }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #9eb4db;
      padding: 0;
      line-height: 1;
    }

    .toggle-pw:hover { color: #57a7ff; }

    .error-msg {
      margin-top: 10px;
      margin-bottom: 4px;
      font-size: 0.82rem;
      color: #ff6b6b;
      min-height: 18px;
      text-align: center;
    }

    button[type="submit"] {
      width: 100%;
      padding: 13px;
      margin-top: 14px;
      background: linear-gradient(135deg, #2d78ff, #57a7ff);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }

    button[type="submit"]:hover { opacity: 0.9; }
    button[type="submit"]:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="26" cy="26" r="26" fill="rgba(45,120,255,0.18)"/>
        <path d="M26 10 C16 10 10 18 10 26 C10 36 18 42 26 42 C34 42 42 36 42 26 C42 18 36 10 26 10Z" stroke="#57a7ff" stroke-width="1.5" fill="none"/>
        <ellipse cx="26" cy="26" rx="8" ry="16" stroke="#57a7ff" stroke-width="1.5" fill="none"/>
        <line x1="10" y1="26" x2="42" y2="26" stroke="#57a7ff" stroke-width="1.5"/>
        <circle cx="26" cy="26" r="3" fill="#57a7ff"/>
      </svg>
      <h1>Samarqand shahrining<br>atmosfera havosi geoportali</h1>
      <p>Tizimga kirish uchun ma'lumotlaringizni kiriting</p>
    </div>
    <div class="divider"></div>

    <form id="loginForm" autocomplete="off">
      <label for="username">Foydalanuvchi nomi</label>
      <input type="text" id="username" placeholder="Login kiriting" autocomplete="username" />

      <label for="password">Parol</label>
      <div class="password-wrap">
        <input type="password" id="password" placeholder="Parol kiriting" autocomplete="current-password" />
        <button type="button" class="toggle-pw" id="togglePw" title="Ko'rsatish">
          <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <div class="error-msg" id="errorMsg"></div>
      <button type="submit">Kirish</button>
    </form>
  </div>

  <script>
    const CREDENTIALS = { username: 'admin', password: 'admin1234' };

    if (sessionStorage.getItem('auth') === 'true') {
      window.location.replace('index.html');
    }

    document.getElementById('togglePw').addEventListener('click', function () {
      const pw = document.getElementById('password');
      const isText = pw.type === 'text';
      pw.type = isText ? 'password' : 'text';
      document.getElementById('eyeIcon').innerHTML = isText
        ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
        : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    });

    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      const err = document.getElementById('errorMsg');

      if (user === CREDENTIALS.username && pass === CREDENTIALS.password) {
        sessionStorage.setItem('auth', 'true');
        window.location.replace('index.html');
      } else {
        err.textContent = 'Login yoki parol noto\'g\'ri. Qayta urinib ko\'ring.';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    });
  </script>
</body>
</html>
